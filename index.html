<!DOCTYPE html>
<html>

<head>
<title>Login + Pythagorean</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
margin-top:100px;
}

.container{
background:white;
width:350px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:5px;
border:1px solid gray;
box-sizing:border-box;
}

button{
padding:10px 20px;
cursor:pointer;
}

.input-box{
position:relative;
}

.eye{
position:absolute;
right:10px;
top:18px;
cursor:pointer;
font-size:18px;
}

#pythSection{
display:none;
}

#log_out{
padding:8px;
background-color:rgb(0,157,255);
border:1px solid black;
border-radius:4px;
cursor:pointer;
}

#log_out:hover{
background-color:aliceblue;
}

#error{
color:red;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->

<div id="loginSection">

<h2>Login</h2>

Username<br>
<input type="text" id="username" placeholder="Enter 6 letters">

Password<br>

<div class="input-box">
<input type="password" id="password" placeholder="Password must contain SWUSTCST">
<span class="eye" onclick="togglePassword()">👁</span>
</div>

<br>

<button onclick="login()">Login</button>

<p style="color:red" id="loginResult"></p>

</div>


<!-- PYTHAGOREAN -->

<div id="pythSection">

<h1 style="color:green;">Login Successful</h1>

<h2>Pythagorean Checker</h2>

Number 1<br>
<input type="text" id="a">

Number 2<br>
<input type="text" id="b">

Number 3<br>
<input type="text" id="c">

<button onclick="check()">Check</button>

<p id="result"></p>
<p id="error"></p>

<br>

<button id="log_out" onclick="logout()">Log Out</button>

</div>

</div>

<script>

function togglePassword(){

let x=document.getElementById("password");

if(x.type==="password"){
x.type="text";
}
else{
x.type="password";
}

}

function login(){

let username=document.getElementById("username").value;
let password=document.getElementById("password").value;

let alphabet=/^[A-Za-z]+$/;

if(!alphabet.test(username)){
alert("Username must contain only letters");
return;
}

if(username.length==6 && password.includes("SWUSTCST")){

document.getElementById("loginSection").style.display="none";
document.getElementById("pythSection").style.display="block";

}

else{

document.getElementById("loginResult").innerText="Username or Password incorrect";

}

}

function check(){

let a=document.getElementById("a").value;
let b=document.getElementById("b").value;
let c=document.getElementById("c").value;

let result=document.getElementById("result");
let error=document.getElementById("error");

result.innerText="";
error.innerText="";

let numA=Number(a);
let numB=Number(b);
let numC=Number(c);

// invalid input check
if(numA<=0 || numB<=0 || numC<=0 || !Number.isInteger(numA) || !Number.isInteger(numB) || !Number.isInteger(numC)){

error.style.color="red";
error.innerText="Negative value, decimal number and symbols are not allowed";

return;

}

// Pythagorean check
if(numA*numA + numB*numB == numC*numC){

result.style.color="green";
result.innerText=`${a}, ${b}, ${c} are Pythagorean numbers`;

// input auto clear
document.getElementById("a").value="";
document.getElementById("b").value="";
document.getElementById("c").value="";

}
else{

error.style.color="red";
error.innerText=`${a}, ${b}, ${c} are not Pythagorean numbers`;

}

}

function logout(){

document.getElementById("pythSection").style.display="none";
document.getElementById("loginSection").style.display="block";

document.getElementById("username").value="";
document.getElementById("password").value="";
document.getElementById("result").innerText="";
document.getElementById("error").innerText="";

}

</script>

</body>
</html>
